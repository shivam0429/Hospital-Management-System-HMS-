{% extends 'base.html' %}{% block title %}Doctors{% endblock %}{% block content %}
<section class="panel form-panel"><h2>Add Doctor</h2><form method="POST" class="grid-form">
<input name="name" placeholder="Doctor Name" required><input name="specialization" placeholder="Specialization" required><input name="phone" placeholder="Phone"><input type="email" name="email" placeholder="Email"><select name="department_id">{% for dep in departments %}<option value="{{ dep.id }}">{{ dep.name }}</option>{% endfor %}</select><input name="availability" placeholder="Mon-Fri, 10 AM - 4 PM"><button>Add Doctor</button></form></section>
<section class="panel"><table><thead><tr><th>Name</th><th>Specialization</th><th>Department</th><th>Phone</th><th>Availability</th><th>Action</th></tr></thead><tbody>{% for d in doctors %}<tr><td>{{ d.name }}</td><td>{{ d.specialization }}</td><td>{{ d.department }}</td><td>{{ d.phone }}</td><td>{{ d.availability }}</td><td><a class="danger-link" onclick="return confirm('Delete doctor?')" href="{{ url_for('delete_doctor', id=d.id) }}">Delete</a></td></tr>{% endfor %}</tbody></table></section>
{% endblock %}
